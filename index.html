<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Getting In Our Way or Leaps Us Ahead</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 30px; color: #333; }
.board { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
.column { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 20px; }
.column h2 { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid; }
.blockers h2 { border-bottom-color: #e74c3c; color: #c0392b; }
.leaps h2 { border-bottom-color: #27ae60; color: #229954; }
.item { padding: 15px; margin-bottom: 15px; border-radius: 6px; border-left: 4px solid; }
.blocker { background: #fadbd8; border-left-color: #e74c3c; }
.leap { background: #d5f4e6; border-left-color: #27ae60; }
</style>
</head>
<body>
<div class="container">
<h1>What's Getting In Our Way or Leaps Us Ahead</h1>
<div class="board">
  <div class="column blockers">
    <h2>🚧 Blockers</h2>
    <div class="item blocker">
      <strong>Add your blockers here</strong>
      <p>Identify obstacles and challenges</p>
    </div>
  </div>
  <div class="column leaps">
    <h2>🚀 Leaps</h2>
    <div class="item leap">
      <strong>Add your leaps here</strong>
      <p>Highlight achievements and breakthroughs</p>
    </div>
  </div>
</div>
</div>
</body>
</html>
